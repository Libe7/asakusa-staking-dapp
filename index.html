<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asakusa Staking</title>
    <!-- Библиотеки -->
    <script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
    <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    
    <style>
        :root { --fire: #ff4500; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            margin: 0; height: 100vh; background: #050505; color: #fff; 
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; 
            align-items: center; overflow: hidden;
            background: radial-gradient(circle at center, #1a0505 0%, #050505 100%);
        }
        /* Анимированный "огненный" фон */
        .glow { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(255,69,0,0.15), transparent 70%); animation: pulse 4s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        
        header { width: 100%; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .logo { font-size: 24px; font-weight: bold; color: var(--fire); letter-spacing: 2px; text-transform: uppercase; }
        
        .panel { 
            background: var(--glass); backdrop-filter: blur(15px); padding: 50px; 
            border-radius: 25px; width: 350px; border: 1px solid rgba(255,255,255,0.1); 
            text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .btn-action { 
            background: linear-gradient(45deg, #ff4500, #ff8c00); border: none; padding: 15px; 
            width: 100%; color: white; font-weight: bold; cursor: pointer; border-radius: 12px; 
            margin-top: 20px; transition: 0.3s; font-size: 16px;
        }
        .btn-action:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,69,0,0.5); }
        select { background: #111; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <header>
        <div class="logo">浅草 Asakusa</div>
        <select id="langSelect" onchange="updateUI()">
            <option value="en">EN</option> <option value="ru">RU</option>
            <option value="ja">JA</option> <option value="es">ES</option>
            <option value="fr">FR</option> <option value="de">DE</option>
            <option value="it">IT</option> <option value="pt">PT</option>
            <option value="zh">ZH</option> <option value="tr">TR</option>
        </select>
    </header>

    <div class="panel">
        <h2 id="titleText" style="margin-top:0;">Staking</h2>
        <input type="number" id="amount" style="width:100%; padding:15px; background:rgba(0,0,0,0.3); border:1px solid #444; color:#fff; border-radius:10px; box-sizing:border-box; margin-bottom: 20px;" placeholder="0.0">
        <button class="btn-action" id="btnText" onclick="onConnect()">Connect Wallet</button>
    </div>

    <script>
        const Web3Modal = window.Web3Modal.default;
        const web3Modal = new Web3Modal({ cacheProvider: false });

        async function onConnect() {
            try {
                const provider = await web3Modal.connect();
                const web3Provider = new ethers.providers.Web3Provider(provider);
                const signer = web3Provider.getSigner();
                const address = await signer.getAddress();
                alert("Connected: " + address);
            } catch(e) { console.log(e); }
        }

        const langs = {
            en: { t: "Staking", c: "Connect Wallet" }, ru: { t: "Стейкинг", c: "Войти в отряд" },
            ja: { t: "ステーキング", c: "分隊に参加する" }, es: { t: "Staking", c: "Conectar" },
            fr: { t: "Staking", c: "Connecter" }, de: { t: "Staking", c: "Verbinden" },
            it: { t: "Staking", c: "Connetti" }, pt: { t: "Staking", c: "Conectar" },
            zh: { t: "质押", c: "连接钱包" }, tr: { t: "Staking", c: "Bağlan" }
        };

        function updateUI() {
            const l = document.getElementById('langSelect').value;
            document.getElementById('titleText').innerText = langs[l].t;
            document.getElementById('btnText').innerText = langs[l].c;
        }
    </script>
</body>
</html>
