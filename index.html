<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asakusa Staking — 7-й отряд пожарных</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3modal@1.9.12/dist/index.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/index.min.js"></script>
    <style>
        :root { --bg-color: #0f0f12; --panel-color: #17171e; --fire-red: #ff3e3e; --fire-orange: #ff7b00; --neon-blue: #00f0ff; --text-light: #f5f5f7; --text-muted: #a0a0ab; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-light); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; max-width: 1200px; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .logo-badge { background: linear-gradient(135deg, var(--fire-red), var(--fire-orange)); color: #000; font-weight: 900; padding: 8px 15px; border-radius: 4px; }
        .container { width: 100%; max-width: 500px; padding: 20px; }
        .panel { background-color: var(--panel-color); border-radius: 8px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn { background: transparent; color: var(--text-light); border: 2px solid var(--text-light); padding: 10px 20px; font-weight: 700; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .btn-action { background: linear-gradient(90deg, var(--fire-red), var(--fire-orange)); border: none; color: #fff; width: 100%; padding: 14px; margin-top: 15px; cursor: pointer; }
        input { width: 100%; background-color: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 4px; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>
    <header>
        <div class="logo-badge">浅草 Asakusa Staking</div>
        <button class="btn" id="connectBtn">Войти в Отряд</button>
    </header>
    <div class="container">
        <div class="panel">
            <h1 style="text-align:center;">7-й ОТРЯД</h1>
            <label>Сумма USDT</label>
            <input type="number" id="amountInput" placeholder="0.0">
            <button class="btn-action" id="deployBtn">Внести Депозит</button>
        </div>
    </div>
    <script>
        const WALLETCONNECT_PROJECT_ID = "7720042f0744733e5304d645283303a8";
        const contractAddress = "0xADE36db3F173e4A0b22CC6680387b926D4da5a7f";
        const usdtAddress = "0x55d398326f99059fF775485246999027B3197955";

        let web3Modal, provider, signer, contract, usdtContract;

        function initWeb3Modal() {
            web3Modal = new Web3Modal.default({
                providerOptions: {
                    walletconnect: {
                        package: window.WalletConnectProvider.default,
                        options: { rpc: { 56: "https://bsc-dataseed.binance.org/" }, projectId: WALLETCONNECT_PROJECT_ID }
                    }
                },
                theme: "dark"
            });
        }

        async function connectWallet() {
            const instance = await web3Modal.connect();
            provider = new ethers.providers.Web3Provider(instance);
            signer = provider.getSigner();
            contract = new ethers.Contract(contractAddress, ["function deposit(uint256,address) external"], signer);
            usdtContract = new ethers.Contract(usdtAddress, ["function approve(address,uint256) returns(bool)"], signer);
            document.getElementById('connectBtn').innerText = "Подключено";
        }

        async function handleDeposit() {
            const amount = ethers.utils.parseUnits(document.getElementById('amountInput').value, 18);
            await (await usdtContract.approve(contractAddress, amount)).wait();
            await (await contract.deposit(amount, "0x0000000000000000000000000000000000000000")).wait();
            alert("Депозит успешен!");
        }

        window.addEventListener('load', () => {
            initWeb3Modal();
            document.getElementById('connectBtn').addEventListener('click', connectWallet);
            document.getElementById('deployBtn').addEventListener('click', handleDeposit);
        });
    </script>
</body>
</html>
