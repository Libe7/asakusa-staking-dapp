<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asakusa Staking</title>
    <!-- Подключаем библиотеки для работы с кошельками -->
    <script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
    <script src="https://unpkg.com/evm-chains@0.2.0/dist/umd/index.min.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    
    <style>
        :root { --fire: #ff4500; --bg: #0d0d0f; }
        body { 
            margin: 0; height: 100vh; color: #fff; font-family: sans-serif; 
            /* Здесь вставлена ссылка на фон. Замени URL на свою картинку Асакусы */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.alphacoders.com/105/1053421.jpg'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center;
        }
        header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .panel { background: rgba(0,0,0,0.85); padding: 40px; border-radius: 15px; width: 300px; margin-top: 100px; border: 1px solid var(--fire); text-align: center; box-shadow: 0 0 20px rgba(255, 69, 0, 0.3); }
        .btn-action { background: var(--fire); border: none; padding: 15px; width: 100%; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 15px; }
        select { background: #111; color: #fff; border: 1px solid var(--fire); padding: 5px; }
        h1 { color: var(--fire); text-shadow: 0 0 10px var(--fire); }
    </style>
</head>
<body>
    <header>
        <h1>浅草 ASAKUSA</h1>
        <select id="langSelect" onchange="updateUI()">
            <option value="en">English</option> <option value="ru">Русский</option>
            <option value="ja">日本語</option> <option value="es">Español</option>
            <option value="fr">Français</option> <option value="de">Deutsch</option>
            <option value="it">Italiano</option> <option value="pt">Português</option>
            <option value="zh">简体中文</option> <option value="tr">Türkçe</option>
        </select>
    </header>

    <div class="panel">
        <h2 id="titleText">Staking</h2>
        <input type="number" id="amount" style="width:100%; padding:10px; background:#222; border:1px solid #444; color:#fff;" placeholder="0.0">
        <button class="btn-action" id="btnText" onclick="onConnect()">Connect Wallet</button>
    </div>

    <script>
        // Инициализация Web3Modal
        const Web3Modal = window.Web3Modal.default;
        const web3Modal = new Web3Modal({
            cacheProvider: false,
            providerOptions: {
                walletconnect: {
                    package: window.WalletConnectProvider.default,
                    options: { infuraId: "27e484dcd9e3efcfd25a83a78777cdf1" }
                }
            }
        });

        async function onConnect() {
            try {
                const provider = await web3Modal.connect();
                const web3Provider = new ethers.providers.Web3Provider(provider);
                const signer = web3Provider.getSigner();
                const address = await signer.getAddress();
                alert("Connected: " + address);
            } catch(e) { console.log("Could not get a wallet connection", e); }
        }

        // Языки
        const langs = {
            en: { t: "Staking", c: "Connect Wallet" }, ru: { t: "Стейкинг", c: "Войти в отряд" },
            ja: { t: "ステーキング", c: "分隊に参加する" }, es: { t: "Staking", c: "Conectar" },
            fr: { t: "Staking", c: "Connecter" }, de: { t: "Staking", c: "Verbinden" },
            it: { t: "Staking", c: "Connetti" }, pt: { t: "Staking", c: "Conectar" },
            zh: { t: "质押", c: "连接钱包" }, tr: { t: "Staking", c: "Bağlan" }
        };

        function updateUI() {
            const l = document.getElementById('langSelect').value;
            document.getElementById('titleText').innerText = langs[l].t;
            document.getElementById('btnText').innerText = langs[l].c;
        }
    </script>
</body>
</html>
