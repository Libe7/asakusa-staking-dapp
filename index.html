<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asakusa Staking</title>
    <script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
    <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    
    <style>
        :root { --asa-red: #ff4500; --asa-black: #050505; --asa-white: #e0e0e0; }
        body { 
            margin: 0; height: 100vh; background: var(--asa-black); color: var(--asa-white); 
            font-family: 'Courier New', Courier, monospace; /* Более "японский" печатный стиль */
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
            background: linear-gradient(180deg, #1a0505 0%, #050505 100%);
        }
        
        /* Эффект пламени */
        .fire-fx { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(255, 69, 0, 0.2), transparent 60%); pointer-events: none; }
        
        header { width: 100%; padding: 30px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { font-size: 28px; font-weight: 900; color: var(--asa-red); text-transform: uppercase; border-left: 5px solid var(--asa-red); padding-left: 15px; }
        
        .panel { 
            background: rgba(10, 10, 10, 0.9); padding: 40px; border-radius: 2px; /* Острые углы */
            width: 320px; border-top: 5px solid var(--asa-red); border-bottom: 5px solid var(--asa-red);
            text-align: center; box-shadow: 0 0 30px rgba(255, 69, 0, 0.2);
        }
        .btn-action { 
            background: var(--asa-red); border: none; padding: 15px; width: 100%; color: #fff; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-action:hover { background: #ff6a33; box-shadow: 0 0 20px var(--asa-red); }
        select { background: #000; color: var(--asa-red); border: 1px solid var(--asa-red); padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="fire-fx"></div>
    <header>
        <div class="logo">浅草 ASAKUSA</div>
        <select id="langSelect" onchange="updateUI()">
            <option value="en">EN</option> <option value="ru">RU</option>
            <option value="ja">JA</option> <option value="es">ES</option>
            <option value="fr">FR</option> <option value="de">DE</option>
            <option value="it">IT</option> <option value="pt">PT</option>
            <option value="zh">ZH</option> <option value="tr">TR</option>
        </select>
    </header>

    <div class="panel">
        <h2 id="titleText" style="margin-top:0;">Staking</h2>
        <input type="number" id="amount" style="width:100%; padding:15px; background:#111; border:1px solid #333; color:#fff; box-sizing:border-box; margin-bottom: 20px;" placeholder="0.0">
        <button class="btn-action" id="btnText" onclick="onConnect()">Connect Wallet</button>
    </div>

    <script>
        const Web3Modal = window.Web3Modal.default;
        const web3Modal = new Web3Modal({ cacheProvider: false });

        async function onConnect() {
            try {
                const provider = await web3Modal.connect();
                const web3Provider = new ethers.providers.Web3Provider(provider);
                const signer = web3Provider.getSigner();
                const address = await signer.getAddress();
                alert("Connected: " + address);
            } catch(e) { console.log(e); }
        }

        const langs = {
            en: { t: "Staking", c: "Connect Wallet" }, ru: { t: "Стейкинг", c: "Войти в отряд" },
            ja: { t: "ステーキング", c: "分隊に参加する" }, es: { t: "Staking", c: "Conectar" },
            fr: { t: "Staking", c: "Connecter" }, de: { t: "Staking", c: "Verbinden" },
            it: { t: "Staking", c: "Connetti" }, pt: { t: "Staking", c: "Conectar" },
            zh: { t: "质押", c: "连接钱包" }, tr: { t: "Staking", c: "Bağlan" }
        };

        function updateUI() {
            const l = document.getElementById('langSelect').value;
            document.getElementById('titleText').innerText = langs[l].t;
            document.getElementById('btnText').innerText = langs[l].c;
        }
    </script>
</body>
</html>
