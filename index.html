<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asakusa Staking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3modal@1.9.12/dist/index.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/index.min.js"></script>
    <style>
        :root { --bg-color: #0f0f12; --panel-color: #17171e; --fire-red: #ff3e3e; --fire-orange: #ff7b00; --text-light: #f5f5f7; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-light); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { width: 100%; max-width: 1200px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .controls { display: flex; gap: 10px; align-items: center; }
        .btn { background: transparent; color: white; border: 1px solid white; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
        .panel { background-color: var(--panel-color); padding: 30px; border-radius: 8px; width: 300px; margin-top: 50px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; box-sizing: border-box; }
        .btn-action { background: linear-gradient(90deg, var(--fire-red), var(--fire-orange)); border: none; padding: 12px; width: 100%; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div id="title">Asakusa Staking</div>
        <div class="controls">
            <select id="langSelect" onchange="updateLanguage()" style="background:#333; color:white;">
                <option value="en">English</option>
                <option value="ru">Русский</option>
            </select>
            <button class="btn" id="connectBtn">Connect Wallet</button>
        </div>
    </header>
    <div class="panel">
        <h2 id="stkTitle">Staking</h2>
        <input type="number" id="amount" placeholder="0.0">
        <button class="btn-action" id="depositBtn">Deposit</button>
    </div>

    <script>
        const translations = {
            en: { title: "Asakusa Staking", connect: "Connect Wallet", stk: "Staking", dep: "Deposit" },
            ru: { title: "Стейкинг Асакуса", connect: "Войти в Отряд", stk: "Стейкинг", dep: "Внести Депозит" }
        };

        function updateLanguage() {
            const lang = document.getElementById('langSelect').value;
            document.getElementById('title').innerText = translations[lang].title;
            document.getElementById('connectBtn').innerText = translations[lang].connect;
            document.getElementById('stkTitle').innerText = translations[lang].stk;
            document.getElementById('depositBtn').innerText = translations[lang].dep;
        }

        // WalletConnect init
        const WALLETCONNECT_PROJECT_ID = "7720042f0744733e5304d645283303a8";
        // ... (остальной код для Web3)
        window.addEventListener('load', updateLanguage);
    </script>
</body>
</html>
