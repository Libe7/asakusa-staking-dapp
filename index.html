<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Asakusa Stake</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/web3modal@1.9.12/dist/index.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: #111; padding: 30px; border: 1px solid #ff4500; border-radius: 15px; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { background: #ff4500; color: #fff; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>ASAKUSA STAKE</h2>
    <input type="number" id="amount" placeholder="Amount USDT">
    <button id="btnConnect" onclick="connect()">Connect Wallet</button>
    <button onclick="approve()">Approve USDT</button>
    <button onclick="stake()">Stake Tokens</button>
</div>

<script>
    // ВАЖНО: Вставьте адрес сюда без кавычек и лишних символов
    const CONTRACT_ADDR = "0xADEd6D7d0571f5407d57D064f2e964C39B7aa5a7f";
    const TOKEN_ADDR = "0x55d398326f96614131557973715c6020c2b29555";

    let signer, contract, token;

    async function connect() {
        try {
            const modal = new Web3Modal.default();
            const instance = await modal.connect();
            const provider = new ethers.providers.Web3Provider(instance);
            signer = provider.getSigner();

            // Принудительная очистка и проверка адресов
            const safeC = ethers.utils.getAddress(CONTRACT_ADDR.trim());
            const safeT = ethers.utils.getAddress(TOKEN_ADDR.trim());

            const abi = [{"inputs":[{"internalType":"uint256","name":"_amount","type":"uint256"},{"internalType":"address","name":"_referrer","type":"address"}],"name":"deposit","outputs":[],"stateMutability":"nonpayable","type":"function"}];
            const abiErc20 = [{"constant":false,"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"}];

            contract = new ethers.Contract(safeC, abi, signer);
            token = new ethers.Contract(safeT, abiErc20, signer);
            
            document.getElementById('btnConnect').innerText = "Connected";
            alert("Кошелек подключен!");
        } catch (e) {
            console.error(e);
            alert("Ошибка подключения: " + e.message);
        }
    }

    async function approve() {
        if(!token) return alert("Сначала подключите кошелек!");
        try {
            const val = ethers.utils.parseEther(document.getElementById('amount').value || "0");
            const tx = await token.approve(ethers.utils.getAddress(CONTRACT_ADDR.trim()), val);
            await tx.wait();
            alert("Одобрено!");
        } catch(e) { alert("Ошибка Approve: " + e.message); }
    }

    async function stake() {
        if(!contract) return alert("Сначала подключите кошелек!");
        try {
            const val = ethers.utils.parseEther(document.getElementById('amount').value || "0");
            const tx = await contract.deposit(val, "0x0000000000000000000000000000000000000000");
            await tx.wait();
            alert("Успешно!");
        } catch(e) { alert("Ошибка Deposit: " + e.message); }
    }
</script>
</body>
</html>
