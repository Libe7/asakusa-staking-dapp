<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Asakusa Staking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #ff4500; padding: 20px; width: 300px; text-align: center; border-radius: 10px; }
        button { background: #ff4500; border: none; padding: 10px; width: 100%; color: white; margin-top: 10px; cursor: pointer; border-radius: 5px; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; }
    </style>
</head>
<body>

<div class="box">
    <h3>ASAKUSA STAKE</h3>
    <input type="number" id="amount" placeholder="Количество USDT">
    <button onclick="connect()">Подключить кошелек</button>
    <button onclick="approve()">Одобрить (Approve)</button>
    <button onclick="stake()">Стейкинг (Stake)</button>
    <p id="msg" style="font-size: 12px; color: #aaa;"></p>
</div>

<script>
    // Очищаем адрес от любых возможных скрытых пробелов
    const CONTRACT_ADDR = "0xADEd6D7d0571f5407d57D064f2e964C39B7aa5a7f".trim();
    const USDT_ADDR = "0x55d398326f96614131557973715c6020c2b29555".trim();
    
    let signer;

    async function connect() {
        if (!window.ethereum) return alert("Установите MetaMask");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        document.getElementById("msg").innerText = "Подключено";
    }

    async function approve() {
        if (!signer) return alert("Подключите кошелек!");
        try {
            // Убираем проверку isAddress, чтобы ethers сам разобрался
            const abi = ["function approve(address spender, uint256 amount) external returns (bool)"];
            const contract = new ethers.Contract(USDT_ADDR, abi, signer);
            const amount = ethers.utils.parseEther(document.getElementById("amount").value || "0");
            
            const tx = await contract.approve(CONTRACT_ADDR, amount);
            await tx.wait();
            alert("Успешно!");
        } catch (e) { alert("Ошибка: " + e.message); console.error(e); }
    }

    async function stake() {
        if (!signer) return alert("Подключите кошелек!");
        try {
            const abi = ["function deposit(uint256 _amount, address _referrer) external"];
            const contract = new ethers.Contract(CONTRACT_ADDR, abi, signer);
            const amount = ethers.utils.parseEther(document.getElementById("amount").value || "0");
            
            const tx = await contract.deposit(amount, "0x0000000000000000000000000000000000000000");
            await tx.wait();
            alert("Успешно!");
        } catch (e) { alert("Ошибка: " + e.message); console.error(e); }
    }
</script>
</body>
</html>
