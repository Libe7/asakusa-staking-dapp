<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Asakusa Staking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #ff4500; padding: 30px; border-radius: 15px; width: 320px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        button { width: 100%; padding: 10px; margin-bottom: 10px; background: #ff4500; border: none; cursor: pointer; color: #fff; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h3>ASAKUSA STAKE</h3>
    <input type="number" id="amount" placeholder="Количество USDT">
    <button onclick="connectWallet()">Подключить кошелек</button>
    <button onclick="approveTokens()">Одобрить USDT</button>
    <button onclick="deposit()">Стейкинг</button>
</div>

<script>
    async function connectWallet() {
        if (!window.ethereum) return alert("Установите MetaMask");
        await window.ethereum.request({ method: 'eth_requestAccounts' });
        alert("Кошелек подключен!");
    }

    async function approveTokens() {
        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const val = document.getElementById("amount").value || "0";
            const amount = ethers.utils.parseEther(val);
            
            // Адрес вшит прямо здесь, исключая любые ошибки переменных
            const tokenContract = new ethers.Contract(
                "0x55d398326f96614131557973715c6020c2b29555", 
                ["function approve(address spender, uint256 amount) external returns (bool)"], 
                signer
            );
            
            const tx = await tokenContract.approve("0xADEd6D7d0571f5407d57D064f2e964C39B7aa5a7f", amount);
            await tx.wait();
            alert("Одобрено!");
        } catch (e) { alert("Ошибка: " + e.message); }
    }

    async function deposit() {
        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const val = document.getElementById("amount").value || "0";
            const amount = ethers.utils.parseEther(val);
            
            const contract = new ethers.Contract(
                "0xADEd6D7d0571f5407d57D064f2e964C39B7aa5a7f", 
                ["function deposit(uint256 _amount, address _referrer) external"], 
                signer
            );
            
            const tx = await contract.deposit(amount, "0x0000000000000000000000000000000000000000");
            await tx.wait();
            alert("Стейкинг успешен!");
        } catch (e) { alert("Ошибка: " + e.message); }
    }
</script>
</body>
</html>
