<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="docTitle">Asakusa Staking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3modal@1.9.12/dist/index.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/index.min.js"></script>
    <style>
        :root { --bg: #0f0f12; --panel: #17171e; --fire: #ff3e3e; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .panel { background: var(--panel); padding: 30px; border-radius: 8px; width: 300px; margin-top: 50px; }
        .btn-action { background: var(--fire); border: none; padding: 12px; width: 100%; color: white; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <select id="langSelect" onchange="updateLanguage()">
            <option value="en">English</option>
            <option value="ru">Русский</option>
        </select>
        <button id="connectBtn">Connect Wallet</button>
    </header>
    <div class="panel">
        <h2 id="stkTitle">Staking</h2>
        <input type="number" id="amount" placeholder="0.0">
        <button class="btn-action" id="depositBtn">Deposit</button>
    </div>

    <script>
        const WALLETCONNECT_PROJECT_ID = "7720042f0744733e5304d645283303a8";
        const translations = {
            en: { title: "Asakusa Staking", connect: "Connect Wallet", stk: "Staking", dep: "Deposit" },
            ru: { title: "Стейкинг Асакуса", connect: "Войти в Отряд", stk: "Стейкинг", dep: "Внести Депозит" }
        };

        function updateLanguage() {
            const lang = document.getElementById('langSelect').value;
            document.getElementById('docTitle').innerText = translations[lang].title;
            document.getElementById('connectBtn').innerText = translations[lang].connect;
            document.getElementById('stkTitle').innerText = translations[lang].stk;
            document.getElementById('depositBtn').innerText = translations[lang].dep;
        }

        // Web3 логика
        const modal = new window.Web3Modal.default({
            cacheProvider: true,
            providerOptions: {
                walletconnect: {
                    package: window.WalletConnectProvider.default,
                    options: { projectId: WALLETCONNECT_PROJECT_ID, rpc: { 56: "https://bsc-dataseed.binance.org/" } }
                }
            }
        });

        document.getElementById('connectBtn').onclick = async () => {
            const instance = await modal.connect();
            const provider = new ethers.providers.Web3Provider(instance);
            alert("Wallet Connected!");
        };

        window.onload = updateLanguage;
    </script>
</body>
</html>
