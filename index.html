<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Asakusa Finance | Yield Platform</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        
        body { 
            background: radial-gradient(circle, #1a0505 0%, #050505 100%); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .panel { 
            background: rgba(15, 15, 15, 0.95); 
            padding: 40px; 
            border: 1px solid #ff4500; 
            border-radius: 20px; 
            width: 350px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.15);
        }
        h2 { margin-bottom: 25px; letter-spacing: 1px; color: #ff4500; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            background: #000; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        button { 
            background: #ff4500; 
            color: #fff; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            cursor: pointer; 
            font-weight: 700; 
            margin-top: 10px; 
            border-radius: 8px; 
            transition: all 0.3s;
        }
        button:hover { background: #ff6a33; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="panel">
    <h2>ASAKUSA STAKE</h2>
    <input type="number" id="amount" placeholder="Введите количество USDT">
    <button onclick="connectWallet()">Подключить кошелек</button>
    <button onclick="approveTokens()">Разрешить USDT (Approve)</button>
    <button onclick="deposit()">Застейкать токены</button>
</div>

<script>
    const contractAddress = "0xADEd6D7d0571f5407d57D064f2e964C39B7aa5a7f";
    const tokenAddress = "0x55d398326f96614131557973715c6020c2b29555";

    const abi = [
        {"inputs":[{"internalType":"uint256","name":"_amount","type":"uint256"},{"internalType":"address","name":"_referrer","type":"address"}],"name":"deposit","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"internalType":"uint256","name":"_index","type":"uint256"}],"name":"withdraw","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"internalType":"address","name":"_user","type":"address"}],"name":"getDepositsCount","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
        {"inputs":[{"internalType":"address","name":"","type":"address"}],"name":"referrers","outputs":[{"internalType":"address","name":"","type":"address"}],"stateMutability":"view","type":"function"},
        {"inputs":[],"name":"stakingToken","outputs":[{"internalType":"contract IERC20","name":"","type":"address"}],"stateMutability":"view","type":"function"}
    ];

    const erc20Abi = [
        {"constant":false,"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"}
    ];

    let provider, signer, contract;

    async function connectWallet() {
        if(!window.ethereum) return alert("Установите MetaMask!");
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        contract = new ethers.Contract(contractAddress, abi, signer);
        alert("Кошелек подключен!");
    }

    async function approveTokens() {
        if(!signer) return alert("Сначала подключите кошелек!");
        const amount = ethers.utils.parseEther(document.getElementById('amount').value);
        const tokenContract = new ethers.Contract(tokenAddress, erc20Abi, signer);
        const tx = await tokenContract.approve(contractAddress, amount);
        await tx.wait();
        alert("Успешно: USDT одобрен!");
    }

    async function deposit() {
        if(!signer) return alert("Сначала подключите кошелек!");
        const amount = ethers.utils.parseEther(document.getElementById('amount').value);
        const ref = "0x0000000000000000000000000000000000000000";
        const tx = await contract.deposit(amount, ref);
        await tx.wait();
        alert("Успешно: Депозит принят!");
    }
</script>
</body>
</html>
